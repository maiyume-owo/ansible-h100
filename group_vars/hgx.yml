---
ansible_user: gn-user
ansible_ssh_private_key_file: "~/.ssh/id_rsa"
ansible_become: true
ansible_become_method: sudo

# Baseline OS
hgx_timezone: "Asia/Bangkok"

# Offline repo base URL
offline_repo_base: "http://10.233.20.238/H100/test/nvidia"

# Package versions (easy to bump)
ofed_version: "24.10-4.1.4.0"
cuda_repo_deb: "cuda-repo-ubuntu2204-12-9-local_12.9.1-575.57.08-1_amd64.deb"
nvidia_driver_repo_deb: "nvidia-driver-local-repo-ubuntu2204-570.211.01_1.0-1_amd64.deb"
nvidia_driver_version: "570"
nccl2_deb: "libnccl2_2.29.7-1+cuda12.9_amd64.deb"
nccl_dev_deb: "libnccl-dev_2.29.7-1+cuda12.9_amd64.deb"
dcgm_deb: "datacenter-gpu-manager_3.3.9_amd64.deb"

# Derived artifact names and paths
ofed_archive: "MLNX_OFED_LINUX-{{ ofed_version }}-ubuntu22.04-x86_64.tgz"
ofed_extracted_dir: "/var/MLNX_OFED_LINUX-{{ ofed_version }}-ubuntu22.04-x86_64"
ofed_local_repo: "{{ ofed_extracted_dir }}/DEBS"
ofed_tarball_path: "/tmp/{{ ofed_archive }}"
ofed_apt_source_file: "/etc/apt/sources.list.d/mlnx-ofed-local.list"
ofed_signing_key: "/usr/share/keyrings/mlnx-ofed-keyring.gpg"

nvidia_driver_repo_path: "/tmp/{{ nvidia_driver_repo_deb }}"
nvidia_driver_repo_dir: "/var/nvidia-driver-local-repo-ubuntu2204-570.211.01"
cuda_repo_path: "/tmp/{{ cuda_repo_deb }}"
cuda_repo_dir: "/var/cuda-repo-ubuntu2204-12-9-local"

# Shared apt environment for non-interactive offline installs
hgx_apt_environment:
  DEBIAN_FRONTEND: noninteractive
  NEEDRESTART_MODE: a
  DEBIAN_PRIORITY: critical

common_packages:
  - apt-transport-https
  - build-essential
  - ca-certificates
  - curl
  - dkms
  - gcc
  - gnupg2
  - libmnl0
  - libnl-3-200
  - libnl-route-3-200
  - linux-headers-{{ ansible_kernel }}
  - lsof
  - make
  - pciutils
  - perl
  - pkg-config
  - python3-distutils
  - tcl
  - tk
  - wget

ofed_packages:
  - mlnx-ofed-all
  - mlnx-nvme-dkms
  - mlnx-nfsrdma-dkms

nvidia_driver_packages:
  - "nvidia-open-{{ nvidia_driver_version }}"
  - "nvidia-fabricmanager-{{ nvidia_driver_version }}"
  - "libnvidia-nscq-{{ nvidia_driver_version }}"
  - mft
  - mft-autocomplete
  - nvidia-gds

nccl_install_order:
  - "{{ nccl2_deb }}"
  - "{{ nccl_dev_deb }}"
  - "{{ dcgm_deb }}"
