---
- name: Set system timezone
  ansible.builtin.timezone:
    name: "{{ hgx_timezone }}"
  register: common_timezone
  notify: Reboot host
  tags:
    - common
    - timezone

- name: Configure temporary apt proxy
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/01proxy
    mode: "0644"
    content: |
      Acquire::http::Proxy "http://10.233.20.238:3142";
      Acquire::https::Proxy "http://10.233.20.238:3142";
  register: common_apt_proxy
  tags:
    - common
    - packages
    - apt

- name: Fix apt sources
  ansible.builtin.copy:
    dest: /etc/apt/sources.list
    mode: "0644"
    content: |
      deb http://archive.ubuntu.com/ubuntu/ jammy main restricted universe multiverse
      deb http://archive.ubuntu.com/ubuntu/ jammy-updates main restricted universe multiverse
      deb http://security.ubuntu.com/ubuntu/ jammy-security main restricted universe multiverse
  register: common_apt_sources
  tags:
    - common
    - packages
    - apt

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
  environment: "{{ hgx_apt_environment }}"
  register: common_apt_cache
  changed_when: false
  tags:
    - common
    - packages
    - apt

- name: Upgrade base operating system packages
  ansible.builtin.apt:
    update_cache: false
    upgrade: dist
  environment: "{{ hgx_apt_environment }}"
  register: common_dist_upgrade
  notify: Reboot host
  tags:
    - common
    - packages
    - upgrade

- name: Install offline build and runtime dependencies
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present
    update_cache: false
  environment: "{{ hgx_apt_environment }}"
  register: common_dependencies
  notify: Reboot host
  tags:
    - common
    - packages
    - dependencies

- name: Remove temporary apt proxy
  ansible.builtin.file:
    path: /etc/apt/apt.conf.d/01proxy
    state: absent
  register: common_apt_proxy_removed
  tags:
    - common
    - packages
    - apt

- name: Refresh apt cache after removing proxy
  ansible.builtin.apt:
    update_cache: true
  environment: "{{ hgx_apt_environment }}"
  register: common_apt_cache_post_proxy
  changed_when: false
  tags:
    - common
    - packages
    - apt

- name: Flush common handlers only when baseline changed
  ansible.builtin.meta: flush_handlers
  when:
    - common_timezone is changed
      or common_apt_proxy is changed
      or common_dist_upgrade is changed
      or common_dependencies is changed
      or common_apt_proxy_removed is changed
  tags:
    - common
    - handlers
